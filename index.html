<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Rioja · Arq. Francisco Valenzuela</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0b0d;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;touch-action:none;}

/* WELCOME */
#welcome{position:fixed;inset:0;z-index:60;background:#0a0b0d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity .8s;}
#welcome.hide{opacity:0;pointer-events:none;}
#wlogo{height:80px;width:auto;margin-bottom:22px;}
#wprj{color:#c8a96e;font-size:9px;letter-spacing:.35em;text-transform:uppercase;margin-bottom:8px;}
#wnom{color:#fff;font-size:28px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
#wcli{color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:36px;}
#wline{width:36px;height:1px;background:rgba(200,169,110,.4);margin-bottom:36px;}
#wbtn{background:transparent;border:1px solid rgba(200,169,110,.5);border-radius:30px;padding:11px 34px;color:#c8a96e;font-size:9px;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;}
#wbtn:active{background:rgba(200,169,110,.15);}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:20;padding-top:env(safe-area-inset-top,0px);background:linear-gradient(to bottom,rgba(8,9,12,.55) 50%,transparent);pointer-events:none;}
#hdr-in{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 16px 20px;}
#hlogo{height:110px;width:auto;object-fit:contain;opacity:.7;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));}
#hname{color:#fff;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;opacity:.55;}
#spill{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);right:14px;z-index:21;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.3);border-radius:20px;padding:4px 10px;color:#c8a96e;font-size:9px;letter-spacing:.1em;text-transform:uppercase;pointer-events:none;}

/* SCENE NAME */
#sname{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 88px);left:50%;transform:translateX(-50%);z-index:19;color:rgba(255,255,255,.65);font-size:9px;letter-spacing:.22em;text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,.9);pointer-events:none;}

/* BOTTOM */
#bot{position:fixed;bottom:0;left:0;right:0;z-index:20;padding-bottom:env(safe-area-inset-bottom,0px);background:linear-gradient(to top,rgba(8,9,12,.93) 60%,transparent);}
#bot-in{display:flex;align-items:flex-end;gap:10px;padding:18px 14px 16px;}
#thumbs{display:flex;gap:8px;flex-shrink:0;}
.tw{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.tb{width:68px;height:40px;border-radius:6px;overflow:hidden;border:2px solid rgba(255,255,255,.12);transition:border-color .2s;}
.tb.active{border-color:#c8a96e;}
.tb img{width:100%;height:100%;object-fit:cover;display:block;}
.tn{color:rgba(184,189,198,.5);font-size:7px;letter-spacing:.1em;text-transform:uppercase;}
#sb{flex:1;}
#zc{display:flex;flex-direction:column;align-items:center;gap:5px;}
#zlbl{color:rgba(184,189,198,.35);font-size:8px;letter-spacing:.13em;text-transform:uppercase;}
#zr{display:flex;gap:6px;}
.zb{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#b8bdc6;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zb:active{background:rgba(200,169,110,.25);border-color:#c8a96e;color:#c8a96e;}

/* FLOAT BUTTONS */
#floats{position:fixed;z-index:21;top:0;right:0;padding-top:calc(env(safe-area-inset-top,0px) + 155px);padding-right:14px;display:flex;flex-direction:column;gap:5px;}
.fb{width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,.18);background:rgba(8,9,12,.72);color:#b8bdc6;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.fb.on,.fb:active{background:rgba(200,169,110,.25);border-color:#c8a96e;color:#c8a96e;}
.fb svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* INDICATORS */
.ind{position:fixed;left:50%;z-index:25;bottom:calc(env(safe-area-inset-bottom,0px) + 100px);transform:translateX(-50%);border-radius:20px;padding:4px 12px;font-size:9px;letter-spacing:.13em;text-transform:uppercase;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;}
#aind{background:rgba(200,169,110,.16);border:1px solid rgba(200,169,110,.35);color:#c8a96e;}
#gind{background:rgba(80,160,255,.14);border:1px solid rgba(80,160,255,.35);color:rgba(130,200,255,.9);}
#cind{background:rgba(255,200,80,.14);border:1px solid rgba(255,200,80,.35);color:rgba(255,220,100,.9);}
.ind.on{opacity:1;}

/* SHARE TOAST */
#stst{position:fixed;left:50%;z-index:30;top:calc(env(safe-area-inset-top,0px) + 170px);transform:translateX(-50%) translateY(-20px);background:rgba(20,22,28,.96);border:1px solid rgba(200,169,110,.4);border-radius:12px;padding:10px 18px;color:#fff;font-size:12px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;}
#stst.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* HIDE UI */
#hideui{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 10px);left:50%;transform:translateX(-50%);z-index:30;background:rgba(8,9,12,.65);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 16px;color:rgba(255,255,255,.6);font-size:9px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;}
body.uih #hdr,body.uih #bot,body.uih #floats,body.uih #sname,body.uih #aind,body.uih #gind{opacity:0;pointer-events:none;}
body.uih #hideui{opacity:.3;}



/* HINT */
#hint{position:fixed;top:50%;left:50%;z-index:15;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;transition:opacity .9s;}
#hint.hide{opacity:0;}
#hint-r{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;animation:pulse 2.2s ease-in-out infinite;}
#hint-r svg{width:26px;height:26px;stroke:rgba(255,255,255,.7);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
#hint-t{color:rgba(255,255,255,.5);font-size:10px;letter-spacing:.18em;text-transform:uppercase;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(1.08);opacity:1;}}

/* LOADER */
#ldr{position:fixed;inset:0;z-index:55;background:#0a0b0d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .6s;}
#ldr.hide{opacity:0;pointer-events:none;}
#llw{padding:16px 30px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);}
#llw img{height:60px;width:auto;display:block;}
#lbw{width:140px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
#lb{height:100%;background:#c8a96e;width:0%;transition:width .3s;}
#lsub{color:rgba(184,189,198,.4);font-size:9px;letter-spacing:.18em;text-transform:uppercase;}

/* MUSIC CONTROLS */
#music-ctrl{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 88px);left:14px;
  z-index:22;display:flex;align-items:center;gap:8px;
  background:rgba(8,9,12,.72);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:5px 12px 5px 8px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:opacity .3s;
}
body.uih #music-ctrl{opacity:0;pointer-events:none;}
#mbtn{
  width:26px;height:26px;border-radius:50%;
  border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);
  color:#fff;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s;
}
#mbtn:active{background:rgba(200,169,110,.35);border-color:#c8a96e;}
#mvol{
  -webkit-appearance:none;appearance:none;
  width:60px;height:3px;border-radius:2px;
  background:rgba(255,255,255,.2);outline:none;cursor:pointer;
}
#mvol::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#c8a96e;cursor:pointer;
}
#mlbl{color:rgba(255,255,255,.5);font-size:8px;letter-spacing:.1em;text-transform:uppercase;}

</style>
</head>
<body>

<!-- LOADER -->
<div id="ldr">
  <div id="llw"><img src="logo.png" alt=""></div>
  <div id="lbw"><div id="lb"></div></div>
  <div id="lsub">Cargando recorrido 360°…</div>
</div>

<!-- WELCOME -->
<div id="welcome">
  <img id="wlogo" src="logo.png" alt="">
  <div id="wprj">Recorrido Virtual 360°</div>
  <div id="wnom">La Rioja</div>
  <div id="wcli">Presentado a: Héctor</div>
  <div id="wline"></div>
  <button id="wbtn">Iniciar recorrido</button>
</div>

<canvas id="cv"></canvas>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-in">
    <img id="hlogo" src="logo.png" alt="">
    <div id="hname">Arq. Francisco Valenzuela</div>
  </div>
</div>
<div id="spill">1 / 3</div>
<div id="sname">Área Asador</div>

<!-- HINT -->
<div id="hint">
  <div id="hint-r"><svg viewBox="0 0 24 24"><path d="M8 12h8M4 8l4 4-4 4M20 8l-4 4 4 4"/></svg></div>
  <div id="hint-t">Arrastra para explorar</div>
</div>

<!-- FLOAT BUTTONS -->
<div id="floats">
  <button class="fb" id="bfs">&#x26F6;</button>
  <button class="fb" id="bauto">&#8635;</button>
  <button class="fb" id="bgyro"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M6.3 6.3a8 8 0 1 0 11.4 0"/><path d="M12 2v4M12 18v4"/></svg></button>
  <button class="fb" id="bcal">&#x25CE;</button>
  <button class="fb" id="breset">&#x2302;</button>
  <button class="fb" id="bshare"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="2"/><circle cx="6" cy="12" r="2"/><circle cx="18" cy="19" r="2"/><path d="M8 13.5l8 4M16 6.5l-8 4"/></svg></button>
</div>

<!-- INDICATORS -->
<div class="ind" id="aind">● Auto-rotando</div>
<div class="ind" id="gind">● Giroscopio activo</div>
<div class="ind" id="cind">✓ Calibrado</div>

<!-- SHARE TOAST -->
<div id="stst">✓ Link copiado</div>

<!-- BOTTOM -->
<div id="bot">
  <div id="bot-in">
    <div id="thumbs"></div>
    <div id="sb"></div>
    <div id="zc">
      <div id="zlbl">Zoom</div>
      <div id="zr">
        <div class="zb" id="bzout">&#8722;</div>
        <div class="zb" id="bzin">+</div>
      </div>
    </div>
  </div>
</div>

<!-- HIDE UI -->
<button id="hideui">&#9660; Ocultar UI</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── SCENES ──────────────────────────────────────────────────────────────────
var SC=[
  {src:'escena1.jpg',label:'Área Asador',thumb:'Asador'},
  {src:'escena2.jpg',label:'Alberca',thumb:'Alberca'},
  {src:'escena3.jpg',label:'Jardín',thumb:'Jardín'}
];

// ── THREE ────────────────────────────────────────────────────────────────────
var cv=document.getElementById('cv');
var R=new THREE.WebGLRenderer({canvas:cv,antialias:true});
R.setPixelRatio(Math.min(window.devicePixelRatio,2));
R.setSize(window.innerWidth,window.innerHeight);
var S=new THREE.Scene();
var CAM=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
var geo=new THREE.SphereGeometry(500,72,36); geo.scale(-1,1,1);
var mesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x111111}));
S.add(mesh);
var TL=new THREE.TextureLoader();
var D2R=Math.PI/180;

// ── STATE ────────────────────────────────────────────────────────────────────
var lon=0,lat=0,fov=75,curIdx=0;
var autoRot=false,hintOff=false,uiHid=false;

// Drag
var drag=false,px=0,py=0,dx0=0,dy0=0;
var THRESH=5;

// Gyro
var gyroOn=false,rA=0,rB=0,rG=0,cA=0,cB=0,cG=0;
function wD(d){while(d>180)d-=360;while(d<-180)d+=360;return d;}
function onOri(e){if(e.alpha==null)return;rA=e.alpha;rB=e.beta;rG=e.gamma;}
window.addEventListener('deviceorientationabsolute',onOri,true);
window.addEventListener('deviceorientation',onOri,true);

// ── LOAD SCENE ───────────────────────────────────────────────────────────────
function loadScene(i){
  curIdx=i;
  lon=0;lat=0;
  document.querySelectorAll('.tb').forEach(function(t,j){t.classList.toggle('active',j===i);});
  document.getElementById('spill').textContent=(i+1)+' / '+SC.length;
  document.getElementById('sname').textContent=SC[i].label;
  TL.load(SC[i].src,function(tex){
    tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
    var m=new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:0});
    mesh.material=m;
    var op=0,fi=setInterval(function(){
      op+=0.06; m.opacity=Math.min(op,1);
      if(op>=1){m.transparent=false;clearInterval(fi);}
    },16);
  });
}

// ── THUMBNAILS ───────────────────────────────────────────────────────────────
var tEl=document.getElementById('thumbs');
SC.forEach(function(sc,i){
  var w=document.createElement('div');w.className='tw';
  var b=document.createElement('div');b.className='tb'+(i===0?' active':'');
  var ig=document.createElement('img');ig.src=sc.src;ig.alt=sc.thumb;
  b.appendChild(ig);w.appendChild(b);
  var l=document.createElement('div');l.className='tn';l.textContent=sc.thumb;
  w.appendChild(l);
  w.addEventListener('click',function(){loadScene(i);dimHint();});
  tEl.appendChild(w);
});



// ── HINT ─────────────────────────────────────────────────────────────────────
function dimHint(){if(!hintOff){hintOff=true;document.getElementById('hint').classList.add('hide');}}

// ── MOUSE ────────────────────────────────────────────────────────────────────
cv.addEventListener('mousedown',function(e){
  drag=false;px=e.clientX;py=e.clientY;dx0=e.clientX;dy0=e.clientY;
  autoRot=false;document.getElementById('aind').classList.remove('on');document.getElementById('bauto').classList.remove('on');
  dimHint();
});
window.addEventListener('mousemove',function(e){
  if(!e.buttons)return;
  if(Math.abs(e.clientX-dx0)>THRESH||Math.abs(e.clientY-dy0)>THRESH)drag=true;
  if(!drag)return;
  lon-=(e.clientX-px)*.22;lat+=(e.clientY-py)*.22;
  lat=Math.max(-85,Math.min(85,lat));
  px=e.clientX;py=e.clientY;
});

// ── TOUCH ────────────────────────────────────────────────────────────────────
var tx=0,ty=0,tx0=0,ty0=0,tdrag=false,pinch0=0;

cv.addEventListener('touchstart',function(e){
  dimHint();
  autoRot=false;document.getElementById('aind').classList.remove('on');document.getElementById('bauto').classList.remove('on');
  if(e.touches.length===1){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
    tx0=tx;ty0=ty;tdrag=false;
  }
  if(e.touches.length===2){
    pinch0=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
  }
},{passive:true});

cv.addEventListener('touchmove',function(e){
  if(e.touches.length===1){
    var nx=e.touches[0].clientX,ny=e.touches[0].clientY;
    if(Math.abs(nx-tx0)>THRESH||Math.abs(ny-ty0)>THRESH)tdrag=true;
    if(tdrag){
      lon-=(nx-tx)*.28;lat+=(ny-ty)*.28;
      lat=Math.max(-85,Math.min(85,lat));
    }
    tx=nx;ty=ny;
  }
  if(e.touches.length===2){
    var d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    fov*=pinch0/d;fov=Math.max(30,Math.min(110,fov));
    CAM.fov=fov;CAM.updateProjectionMatrix();pinch0=d;
  }
},{passive:true});

// ── WHEEL ────────────────────────────────────────────────────────────────────
cv.addEventListener('wheel',function(e){
  e.preventDefault();fov+=e.deltaY*.04;fov=Math.max(30,Math.min(110,fov));
  CAM.fov=fov;CAM.updateProjectionMatrix();dimHint();
},{passive:false});

// ── ZOOM BTNS ────────────────────────────────────────────────────────────────
document.getElementById('bzin').addEventListener('click',function(){fov=Math.max(30,fov-10);CAM.fov=fov;CAM.updateProjectionMatrix();});
document.getElementById('bzout').addEventListener('click',function(){fov=Math.min(110,fov+10);CAM.fov=fov;CAM.updateProjectionMatrix();});

// ── AUTO ROTATE ──────────────────────────────────────────────────────────────
document.getElementById('bauto').addEventListener('click',function(){
  autoRot=!autoRot;
  document.getElementById('aind').classList.toggle('on',autoRot);
  this.classList.toggle('on',autoRot);
});

// ── FULLSCREEN ───────────────────────────────────────────────────────────────
document.getElementById('bfs').addEventListener('click',function(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();this.textContent='✕';}
  else{document.exitFullscreen&&document.exitFullscreen();}
});
document.addEventListener('fullscreenchange',function(){
  if(!document.fullscreenElement)document.getElementById('bfs').textContent='⛶';
  setTimeout(function(){R.setSize(window.innerWidth,window.innerHeight);CAM.aspect=window.innerWidth/window.innerHeight;CAM.updateProjectionMatrix();},150);
});

// ── GYRO ─────────────────────────────────────────────────────────────────────
function doGyro(){
  var sa=(window.screen.orientation&&window.screen.orientation.angle!=null)?window.screen.orientation.angle:(window.orientation||0);
  var tLon,tLat;
  if(Math.abs(sa)===90){tLon=-(rA-cA);tLat=-(rG-cG)*.8;}
  else{tLon=wD(-(rA-cA));tLat=-((rB-cB)-(0))*.9;}
  tLat=Math.max(-85,Math.min(85,tLat));
  lon+=wD(tLon-lon)*.1;
  lat+=(tLat-lat)*.1;
}
function calibrate(){cA=rA;cB=rB;cG=rG;}

document.getElementById('bgyro').addEventListener('click',function(){
  if(gyroOn){
    gyroOn=false;this.classList.remove('on');document.getElementById('gind').classList.remove('on');return;
  }
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(s){
      if(s==='granted'){gyroOn=true;calibrate();document.getElementById('bgyro').classList.add('on');document.getElementById('gind').classList.add('on');}
      else alert('Permiso denegado.');
    });
  } else {
    gyroOn=true;calibrate();this.classList.add('on');document.getElementById('gind').classList.add('on');
  }
});

document.getElementById('bcal').addEventListener('click',function(){
  calibrate();
  var ci=document.getElementById('cind');ci.classList.add('on');
  setTimeout(function(){ci.classList.remove('on');},1500);
});

// ── RESET ────────────────────────────────────────────────────────────────────
document.getElementById('breset').addEventListener('click',function(){lon=0;lat=0;fov=75;CAM.fov=fov;CAM.updateProjectionMatrix();});

// ── SHARE ────────────────────────────────────────────────────────────────────
document.getElementById('bshare').addEventListener('click',function(){
  var url=window.location.href;
  if(navigator.share){navigator.share({title:'La Rioja · Arq. Francisco Valenzuela',url:url}).catch(function(){});return;}
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){showT('✓ Link copiado');});}
  else{window.prompt('Copia:',url);}
});
function showT(m){var t=document.getElementById('stst');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}

// ── HIDE UI ──────────────────────────────────────────────────────────────────
var hu=document.getElementById('hideui');
hu.addEventListener('click',function(e){
  e.stopPropagation();
  uiHid=!uiHid;
  document.body.classList.toggle('uih',uiHid);
  hu.textContent=uiHid?'▲ Mostrar UI':'▼ Ocultar UI';
});
cv.addEventListener('click',function(){
  if(uiHid&&!tdrag){
    uiHid=false;document.body.classList.remove('uih');
    hu.textContent='▼ Ocultar UI';
  }
});

// ── WELCOME ──────────────────────────────────────────────────────────────────
document.getElementById('wbtn').addEventListener('click',function(){
  var w=document.getElementById('welcome');
  w.classList.add('hide');
  setTimeout(function(){w.style.display='none';},900);
});

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')lon-=2;if(e.key==='ArrowRight')lon+=2;
  if(e.key==='ArrowUp')lat=Math.min(85,lat+2);if(e.key==='ArrowDown')lat=Math.max(-85,lat-2);
  if(e.key==='+'||e.key==='='){fov=Math.max(30,fov-5);CAM.fov=fov;CAM.updateProjectionMatrix();}
  if(e.key==='-'){fov=Math.min(110,fov+5);CAM.fov=fov;CAM.updateProjectionMatrix();}
  if(e.key==='1')loadScene(0);if(e.key==='2')loadScene(1);if(e.key==='3')loadScene(2);
});

// ── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize',function(){
  R.setSize(window.innerWidth,window.innerHeight);
  CAM.aspect=window.innerWidth/window.innerHeight;CAM.updateProjectionMatrix();
});

// ── RENDER LOOP ──────────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  if(gyroOn) doGyro();
  else if(autoRot)lon+=0.1;
  lat=Math.max(-85,Math.min(85,lat));
  var phi=(90-lat)*D2R,th=lon*D2R;
  CAM.lookAt(500*Math.sin(phi)*Math.cos(th),500*Math.cos(phi),500*Math.sin(phi)*Math.sin(th));
  R.render(S,CAM);
}
animate();

// ── LOADER ───────────────────────────────────────────────────────────────────
var lb=document.getElementById('lb');lb.style.width='35%';
var pi=new Image();
pi.onload=pi.onerror=function(){
  lb.style.width='100%';
  setTimeout(function(){
    document.getElementById('ldr').classList.add('hide');
    loadScene(0);
  },600);
};
pi.src=SC[0].src;

/* ── MUSIC ── */
var audio = document.getElementById('audio');
var mbtn  = document.getElementById('mbtn');
var mvol  = document.getElementById('mvol');
var playing = false;

audio.volume = 0.4;

mbtn.addEventListener('click', function(e){
  e.stopPropagation();
  if(playing){
    audio.pause();
    mbtn.textContent = '▶';
    playing = false;
  } else {
    audio.play().then(function(){
      mbtn.textContent = '⏸';
      playing = true;
    }).catch(function(){});
  }
});

mvol.addEventListener('input', function(){
  audio.volume = parseFloat(this.value);
});

// Auto-play after welcome screen
document.getElementById('wbtn').addEventListener('click', function(){
  setTimeout(function(){
    audio.play().then(function(){
      mbtn.textContent = '⏸';
      playing = true;
    }).catch(function(){});
  }, 900);
});
</script>

<!-- AUDIO -->
<audio id="audio" loop preload="none">
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- MUSIC CONTROLS -->
<div id="music-ctrl">
  <button id="mbtn" title="Play/Pause">▶</button>
  <span id="mlbl">Jazz</span>
  <input type="range" id="mvol" min="0" max="1" step="0.05" value="0.4">
</div>
